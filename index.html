<!doctype html>
<html lang="en" style="color-scheme: light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <meta name="theme-color" content="#667eea">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>HealthSpire Lab Management System</title>
    <style>
      html, body { margin: 0; padding: 0; }
      #preloader {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
        font-family: 'Poppins', system-ui, -apple-system, Segoe UI, sans-serif;
      }
      #preloader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .preloader-content { text-align: center; color: #fff; }
      .preloader-logo {
        width: 80px; height: 80px;
        background: #fff;
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        animation: pulse 2s ease-in-out infinite;
      }
      .preloader-logo svg { width: 44px; height: 44px; color: #667eea; }
      .preloader-title {
        font-size: 28px; font-weight: 700; margin-bottom: 6px;
        text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      }
      .preloader-subtitle { font-size: 13px; opacity: 0.9; margin-bottom: 26px; }
      .preloader-spinner {
        width: 44px; height: 44px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }
      .preloader-progress {
        width: 200px; height: 4px;
        background: rgba(255,255,255,0.3);
        border-radius: 2px; margin: 18px auto 0; overflow: hidden;
      }
      .preloader-progress-bar {
        width: 0%; height: 100%; background: #fff;
        border-radius: 2px; animation: progress 3s ease-in-out infinite;
      }
      .preloader-status { font-size: 12px; opacity: 0.85; margin-top: 14px; }
      @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes progress { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="preloader-content">
        <div class="preloader-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
          </svg>
        </div>
        <div class="preloader-title">HealthSpire</div>
        <div class="preloader-subtitle">Lab Management System</div>
        <div class="preloader-spinner"></div>
        <div class="preloader-progress"><div class="preloader-progress-bar"></div></div>
        <div class="preloader-status" id="preloader-status">Loading modules...</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var statuses = ['Loading modules...', 'Connecting to database...', 'Preparing interface...', 'Almost ready...'];
        var i = 0;
        var el = document.getElementById('preloader-status');
        var timer = setInterval(function () {
          if (!el) return;
          el.textContent = statuses[i % statuses.length];
          i++;
        }, 900);
        window.__hidePreloader = function () {
          clearInterval(timer);
          var p = document.getElementById('preloader');
          if (!p) return;
          p.classList.add('hidden');
          setTimeout(function () { if (p && p.parentNode) p.parentNode.removeChild(p); }, 600);
        };
        // Safety fallback: hide after 15s even if app never signals ready
        setTimeout(function () { if (window.__hidePreloader) window.__hidePreloader(); }, 15000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
